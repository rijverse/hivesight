name: ci
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: compose config (all profiles)
        run: |
          docker compose -f docker-compose.yml -f docker-compose-ai-av.yml \
            --profile cowrie --profile dionaea --profile logging --profile ai \
            config >/dev/null
      - name: shell syntax
        run: |
          bash -n bin/up.sh
          sh -n egress-block.sh
      - name: python compile
        run: python3 -m py_compile orchestrator.py dionaea-sqlite-pump.py
