server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: cowrie
    static_configs:
      - targets:
          - localhost
        labels:
          job: cowrie
          __path__: /var/log/cowrie/cowrie.json
    pipeline_stages:
      - regex:
          expression: "^(?P<line>.*)$"
      - json:
          expressions:
            eventid: eventid
            protocol: protocol
            src_ip: src_ip
      # Drop your own test traffic before it reaches Loki. EXCLUDE_IP_REGEX is
      # expanded from the environment (config.expand-env, set on the promtail
      # service) and defaults to a bogus IP that never matches. src_ip is
      # extracted only for this test, not promoted to a label, so no new streams.
      - drop:
          source: src_ip
          expression: '$${EXCLUDE_IP_REGEX}'
          drop_counter_reason: excluded_ip
      # Map cowrie's `protocol` JSON field (ssh|telnet) to a `service`
      # label. The regex extracts a `service` field, and the labels
      # stage promotes it as a Loki label.
      - regex:
          expression: "^(?P<service>ssh|telnet)$"
          source: protocol
      # Promote only bounded-cardinality fields as Loki labels. src_ip,
      # username and password stay in the JSON body: as labels every
      # attacker IP / credential pair mints a new stream and bloats the
      # index. Dashboards group by them via `| json` at query time instead.
      - labels:
          service:
          protocol:
          eventid:

  - job_name: dionaea
    static_configs:
      - targets:
          - localhost
        labels:
          job: dionaea
          __path__: /var/log/dionaea/dionaea.json
    pipeline_stages:
      - regex:
          expression: "^(?P<line>.*)$"
      - json:
          expressions:
            connection_protocol: connection_protocol
            protocol: protocol
            src_ip: src_ip
      # Same self-traffic filter as the cowrie job above.
      - drop:
          source: src_ip
          expression: '$${EXCLUDE_IP_REGEX}'
          drop_counter_reason: excluded_ip
      # Map dionaea's `protocol` field (smbd, httpd, ftpd, mongodb,
      # SipSession, Memcache, etc.) to a canonical service name.
      - regex:
          expression: "^(?P<service>smbd|httpd|httpsd|ftpd|mysqld|mqttd|mssqld|sipd|redisd|memcachedd|mongodb|mongod|upnpd|Memcache|SipSession|rtpd)$"
          source: protocol
      # src_ip deliberately not promoted; see the cowrie job above.
      - labels:
          service:
          protocol:
          connection_protocol: