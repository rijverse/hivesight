apiVersion: 1

# Root routing policy: every alert is delivered to the stack-default contact
# point (a no-op webhook). Add sub-routes here when there are multiple
# severity tiers or contact points.
policies:
  - orgId: 1
    receiver: stack-default
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h