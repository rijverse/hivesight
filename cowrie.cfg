# honeypot-stack — cowrie operator config overlay.
#
# Inside the container cowrie's cwd is /cowrie/cowrie-git. It reads operator
# config from etc/cowrie.cfg (cwd-relative) and overlays it on the bundled
# cowrie.cfg.dist shipped inside the cowrie package. We only override the
# auth-related keys.
#
# Reference: cowrie/core/auth.py — class AuthRandom.

[honeypot]
# Force every first-time SSH connection from a given src_ip to fail a random
# number of times (between mintry and maxtry, below) with distinct credential
# pairs before being let in. Re-using the same (src_ip, user, pass) on the
# same session never counts as a fresh attempt. After the Nth successful try,
# the (user, pass) pair used is cached per IP for maxcache future connections
# so legitimate-looking repeats just walk straight in.
auth_class = AuthRandom
auth_class_parameters = 3, 5, 10
